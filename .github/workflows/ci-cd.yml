name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

jobs:
  # ══════════════════════════════
  # Lint & Type Check
  # ══════════════════════════════
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, backend]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.service }}

      - name: Lint
        run: npm run lint
        working-directory: ${{ matrix.service }}

      - name: Type check (Backend)
        if: matrix.service == 'backend'
        run: npx tsc --noEmit
        working-directory: ${{ matrix.service }}

  # ══════════════════════════════
  # Python Lint
  # ══════════════════════════════
  lint-python:
    name: Lint Python AI Service
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff
        working-directory: ai-service

      - name: Lint with ruff
        run: ruff check .
        working-directory: ai-service

  # ══════════════════════════════
  # Build
  # ══════════════════════════════
  build:
    name: Build
    needs: [lint, lint-python]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, backend]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.service }}

      - name: Build
        run: npm run build
        working-directory: ${{ matrix.service }}
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:5000/api' }}
          NEXT_PUBLIC_WS_URL: ${{ secrets.NEXT_PUBLIC_WS_URL || 'http://localhost:5000' }}

  # ══════════════════════════════
  # Test
  # ══════════════════════════════
  test:
    name: Test
    needs: [lint]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.service }}

      - name: Run tests
        run: npm test
        working-directory: ${{ matrix.service }}

  # ══════════════════════════════
  # Docker Build
  # ══════════════════════════════
  docker-build:
    name: Docker Build
    needs: [build, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    strategy:
      matrix:
        include:
          - service: frontend
            context: ./frontend
          - service: backend
            context: ./backend
          - service: ai-service
            context: ./ai-service

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t interviewprepai-${{ matrix.service }}:latest ${{ matrix.context }}

  # ══════════════════════════════
  # Deploy Frontend (Vercel)
  # ══════════════════════════════
  deploy-frontend:
    name: Deploy Frontend
    needs: [build, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend

  # ══════════════════════════════
  # Deploy Backend (Railway)
  # ══════════════════════════════
  deploy-backend:
    name: Deploy Backend
    needs: [build, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        uses: berviantoleo/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: backend
