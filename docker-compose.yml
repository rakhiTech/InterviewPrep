version: "3.8"

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: interviewprepai-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: interviewprepai
    networks:
      - app-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (for Socket.io adapter & caching)
  redis:
    image: redis:7-alpine
    container_name: interviewprepai-redis
    ports:
      - "6379:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Express Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interviewprepai-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://mongodb:27017/interviewprepai
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai-service:8000
      JUDGE0_URL: http://judge0-server:2358
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      CORS_ORIGIN: http://localhost:3000
      PORT: 5000
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - app-network

  # FastAPI AI Service
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: interviewprepai-ai-service
    ports:
      - "8000:8000"
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      MONGODB_URI: mongodb://mongodb:27017/interviewprepai
      ENVIRONMENT: development
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./ai-service:/app
    networks:
      - app-network

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: interviewprepai-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
      NEXT_PUBLIC_WS_URL: http://localhost:5000
      NEXT_PUBLIC_AI_SERVICE_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - app-network

  # Judge0 - Code Execution Engine (Self-hosted)
  judge0-server:
    image: judge0/judge0:1.13.1
    container_name: interviewprepai-judge0
    ports:
      - "2358:2358"
    privileged: true
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network

  judge0-workers:
    image: judge0/judge0:1.13.1
    container_name: interviewprepai-judge0-workers
    command: ["./scripts/workers"]
    privileged: true
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network

volumes:
  mongodb_data:

networks:
  app-network:
    driver: bridge
